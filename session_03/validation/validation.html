<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sinh Viên - Validation</title>
    <link rel = "stylesheet" href = "validation.css">
</head>
<body>    
    <form id="studentForm">
        <div class="form-group">
            <label for="studentId">Mã sinh viên:</label>
            <input type="text" id="studentId" placeholder="Nhập mã SV (9 ký tự)">
            <span class="error-message" id="studentIdError"></span>
        </div>

        <div class="form-group">
            <label for="fullName">Họ và tên:</label>
            <input type="text" id="fullName" placeholder="Nhập họ và tên (Tối thiểu 10 ký tự)">
            <span class="error-message" id="fullNameError"></span>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="text" id="email" placeholder="example@gmail.com">
            <span class="error-message" id="emailError"></span>
        </div>

        <div class="form-group">
            <label for="score">Điểm số:</label>
            <input type="number" step="0.1" id="score" placeholder="Nhập điểm từ lớn hơn 4 đến nhỏ hơn 7">
            <span class="error-message" id="scoreError"></span>
        </div>

        <div class="form-group">
            <label for="enrollDate">Ngày nhập học:</label>
            <input type="date" id="enrollDate">
            <span class="error-message" id="enrollDateError"></span>
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
            <span class="error-message" id="passwordError"></span>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Xác nhận Mật khẩu:</label>
            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
            <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <button type="submit">Lưu Sinh Viên</button>
    </form>

    <hr>
    <h3>Danh sách Sinh Viên</h3>
    <table>
        <thead>
            <tr>
                <th>Mã SV</th>
                <th>Họ Tên</th>
                <th>Email</th>
                <th>Điểm</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="studentList">
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
