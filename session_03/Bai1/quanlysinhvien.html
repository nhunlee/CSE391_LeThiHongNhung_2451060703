<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="quanlysinhvien.css">
</head>
<body>
    <h1>Quản Lý Sinh Viên</h1>
    
    <div class="stats-container">
        <p>Tổng số sinh viên: <span id="total-students">0</span></p>
        <p>Điểm trung bình cả lớp: <span id="avg-score">0.0</span></p>
    </div>

    <button id="btn-add">Thêm sinh viên</button>
    <div id="notification" class="hidden"></div>

    <table>
        <thead>
            <tr>
                <th>Mã SV</th>
                <th>Họ tên</th>
                <th>Ngày sinh</th>
                <th>Lớp</th>
                <th>Điểm TB</th>
                <th>Email</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="student-list">
            </tbody>
    </table>

    <div id="modal-overlay" class="hidden">
        <div class="modal-content">
            <h2 id="modal-title">Thêm Sinh Viên</h2>
            <form id="student-form">
                <input type="hidden" id="edit-index" value="-1">
                
                <label>Mã SV: <input type="text" id="sv-id" required></label>
                <label>Họ tên: <input type="text" id="sv-name" required></label>
                <label>Ngày sinh: <input type="date" id="sv-dob" required></label>
                <label>Lớp: <input type="text" id="sv-class" required></label>
                <label>Điểm TB: <input type="number" step="0.1" id="sv-score" required></label>
                <label>Email: <input type="email" id="sv-email" required></label>
                
                <div class="form-actions">
                    <button type="submit" id="btn-save">Lưu</button>
                    <button type="button" id="btn-close">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
