<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transitions & Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px;">Demo Hiệu ứng CSS</h2>

        <div class="spinner"></div>

        <div class="fade-in-element">
            
            <div class="product-card">
                
                <div class="image-container">
                    <img src="https://via.placeholder.com/300x200" alt="Product Image" class="product-image">
                </div>
                
                <div class="card-content">
                    <h3>Sản phẩm Demo</h3>
                    <p class="price">250.000đ</p>
                    
                    <button class="buy-btn">Mua ngay</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
