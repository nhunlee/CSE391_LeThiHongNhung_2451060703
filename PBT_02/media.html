<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS</title>
</head>
<body>

    <header>
        <h1>BTS</h1>
        <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="25,20 45,30 45,80 25,90" fill="black" />
        <polygon points="75,20 55,30 55,80 75,90" fill="black" />
        </svg>
    </header>

    <hr>

    <section>
        <h2>BTS COMEBACK WITH 'ARIRANG'</h2>
        <h3>Bài hát: SWIM</h3>
        <audio controls>
            <source src="background-music.mp3" type="audio/mpeg">
            <source src="background-music.ogg" type="audio/ogg">
        </audio>
    </section>

    <hr>

    <section>
        <h2>Concert của BTS</h2>
        
        <figure>
            <img src="goyang.png" 
                 alt="BTS WORLD TOUR 'ARIRANG' IN GOYANG" 
                 loading="lazy" style="max-width: 100%; height: auto;">
            <figcaption>Concert sử dụng sân khấu 360 độ</figcaption>
        </figure>

        <figure>
            <img src="tokyo.png" 
                 alt="BTS WORLD TOUR 'ARIRANG' IN TOKYO" 
                 loading="lazy" style="max-width: 100%; height: auto;">
            <figcaption>"ARIRANG" tại Tokyo Dome thu hút 110.000 khán giả</figcaption>
        </figure>

        <figure>
            <img src="tampa.png" 
                 alt="BTS WORLD TOUR 'ARIRANG' IN TAMPA">
            <figcaption>Tất cả 3 đêm diễn tại Tampa đều đã sold out với sức chứa khoảng 65.000 - 75.000 người mỗi đêm.</figcaption>
        </figure>
    </section>

    <hr>

    <section>
        <h2>Video Concert của BTS</h2>
        <video controls poster="video-thumbnail.jpg" style="max-width: 100%; height: auto;" width="600">
            <source src="huong-dan.mp4" type="video/mp4">
            <source src="huong-dan.webm" type="video/webm">
        </video>
    </section>

    <hr>

    <section>
        <h2>recommend: 2.0(Nhúng)</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/_gyultVTesk?si=TMQ_oa7ScnHOZSe3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>

</body>
</html>
