<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HTML5 Validation Test</title>
</head>
<body>

    <form action="#">
        Trường hợp 1: User để trống (required) <br>
        <input type="text" required value="">
        <br><br>

        Trường hợp 2: User gõ "abc" (email) <br>
        <input type="email" value="abc">
        <br><br>

        Trường hợp 3: User gõ 15 (number min=1 max=10) <br>
        <input type="number" min="1" max="10" value="15">
        <br><br>

        Trường hợp 4: User gõ "abc123" (pattern 10 số) <br>
        <input type="text" pattern="[0-9]{10}" value="abc123">
        <br><br>

        Trường hợp 5: User gõ "123" (password minlength 8) <br>
        <input type="password" minlength="8" value="123">
        <br><br>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
