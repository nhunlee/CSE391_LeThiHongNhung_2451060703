<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Playground</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>

    <!-- Fixed Header -->
    <header class="header">
        <div class="logo">MyStore</div>
        <nav class="navigation">
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="#">Liên hệ</a>
        </nav>
    </header>

    <div class="container">
        <!-- Sticky Sidebar -->
        <aside class="sidebar">
            <h2>Danh mục</h2>
            <ul>
                <li>Điện thoại</li>
                <li>Laptop</li>
                <li>Phụ kiện</li>
            </ul>
            <p style="margin-top: 20px; color: #666;">
                <i>*Cuộn trang xuống để xem Sidebar "dính" lại.</i>
            </p>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <h1>Sản phẩm nổi bật</h1>
            
            <!-- Card Sản Phẩm -->
            <div class="product-card">
                <!-- Badge Tuyệt đối (Absolute) -->
                <div class="badge">HOT</div>
                <div class="product-image">Ảnh sản phẩm</div>
                <h3 class="product-title">Realme GT Neo 3T</h3>
                <p class="product-price">8.500.000đ</p>
            </div>

            <!-- Vùng tạo khoảng trống lớn để có thể cuộn trang (Scroll) -->
            <div class="scroll-space">
                <p>Tiếp tục cuộn xuống...</p>
                <p style="margin-top: 500px;">Đang cuộn...</p>
                <p style="margin-top: 500px;">Sắp đến cuối trang...</p>
                <p style="margin-top: 500px;">Cuối trang.</p>
            </div>
        </main>
    </div>

    <!-- Nút Scroll to Top Cố định (Fixed) -->
    <button class="scroll-to-top" title="Lên đầu trang">↑</button>

</body>
</html>
